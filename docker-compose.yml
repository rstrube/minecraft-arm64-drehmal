services:
  minecraft:
    image: itzg/minecraft-server:java21
    container_name: minecraft-arm64-drehmal
    platform: linux/arm64
    tty: true
    stdin_open: true
    restart: unless-stopped
    ports:
      - "25565:25565"
    environment:
      # Required
      EULA: "TRUE"

      # Run as your user (robert)
      UID: "1001"
      GID: "1001"

      # Fabric + Minecraft version to match Drehmal
      TYPE: FABRIC
      VERSION: "1.20.1"
      FABRIC_LOADER_VERSION: "0.15.11"

      # Use pre-existing world
      LEVEL: world

      # Performance tuning for N2+ (4GB RAM)
      MEMORY: "3G"
      JVM_OPTS: >-
        -XX:+UseG1GC
        -XX:+ParallelRefProcEnabled
        -XX:MaxGCPauseMillis=200
        -XX:+UnlockExperimentalVMOptions
        -XX:+DisableExplicitGC
        -XX:G1HeapWastePercent=5
        -XX:G1MixedGCCountTarget=4
        -XX:G1MixedGCLiveThresholdPercent=90
        -XX:G1RSetUpdatingPauseTimePercent=5
        -XX:SurvivorRatio=32
        -XX:+PerfDisableSharedMem
        -XX:MaxTenuringThreshold=1

      # Server settings
      MAX_PLAYERS: "8"
      DIFFICULTY: normal
      SPAWN_PROTECTION: "0"
      VIEW_DISTANCE: "8"
      SIMULATION_DISTANCE: "6"
      ONLINE_MODE: "TRUE"

    volumes:
      - /opt/minecraft/drehmal/data:/data
      - /opt/minecraft/drehmal/mods:/mods:ro

    # Optionally limit CPU resources
    #deploy:
    #  resources:
    #    limits:
    #      cpus: '3.5'